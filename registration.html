<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — МойБюджет</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page page--registration">

  <header class="header header--simple">
    <div class="header__inner container">
      <a href="index.html" class="header__logo logo">
        <img src="images/cat-logo.jpg" alt="МойБюджет" class="logo__img">
        <span class="logo__text">МойБюджет</span>
      </a>

      <button class="header__burger burger" type="button" aria-label="Открыть меню">
        <span class="burger__line"></span>
        <span class="burger__line"></span>
        <span class="burger__line"></span>
      </button>

      <nav class="header__nav nav">
        <ul class="nav__list">
          <li class="nav__item"><a href="index.html" class="nav__link">Главная</a></li>
          <li class="nav__item"><a href="account.html" class="nav__link">Вход</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main main--center">
    <section class="auth">
      <div class="auth__box">
        <a href="index.html" class="auth__logo">
          <img src="images/cat-logo.jpg" alt="МойБюджет" class="logo__img logo__img--auth">
        </a>
        <h1 class="auth__title">Регистрация</h1>
        <p class="auth__subtitle">Создай аккаунт для учёта бюджета</p>

        <form class="auth__form form" id="reg-form" novalidate>
          <div class="form__group">
            <label class="form__label" for="username">Имя пользователя</label>
            <input class="form__input" type="text" id="username" name="username" placeholder="Например: ivanov">
            <span class="form__error" id="err-username"></span>
          </div>

          <div class="form__group">
            <label class="form__label" for="email">Электронная почта</label>
            <input class="form__input" type="email" id="email" name="email" placeholder="mail@example.ru">
            <span class="form__error" id="err-email"></span>
          </div>

          <div class="form__group">
            <label class="form__label" for="password">Пароль</label>
            <input class="form__input" type="password" id="password" name="password" placeholder="Минимум 6 символов">
            <span class="form__error" id="err-password"></span>
          </div>

          <div class="form__group">
            <label class="form__label" for="password2">Подтверждение пароля</label>
            <input class="form__input" type="password" id="password2" name="password2" placeholder="Повторите пароль">
            <span class="form__error" id="err-password2"></span>
          </div>

          <div class="form__group form__group--checkbox">
            <label class="form__checkbox">
              <input type="checkbox" id="agree" name="agree">
              <span>Согласен с <a href="#">условиями</a> обработки данных</span>
            </label>
            <span class="form__error" id="err-agree"></span>
          </div>

          <button class="form__submit btn btn--primary btn--block" type="submit">Зарегистрироваться</button>
        </form>

        <p class="auth__footer">
          Уже есть аккаунт? <a href="account.html">Войти в личный кабинет</a>
        </p>
      </div>
    </section>
  </main>

  <footer class="footer footer--mini">
    <div class="container footer--mini__inner">
      <a href="index.html" class="footer__logo logo">
        <img src="images/cat-logo.jpg" alt="МойБюджет" class="logo__img logo__img--footer">
        <span class="logo__text">МойБюджет</span>
      </a>
      <p class="footer__copy">© 2026 МойБюджет</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/registration.js"></script>
</body>
</html>
